spring.application.name=flowcarreiras-api

# Em testes o schema e criado pelo Hibernate (ddl-auto: create-drop no perfil default,
# herdado de src/main/resources/application.yml). O Flyway fica desabilitado para evitar
# conflito com o schema ja criado pelo Hibernate no H2 (erro "non-empty schema but no
# schema history table"). Producao/Docker continuam usando Flyway normalmente.
spring.flyway.enabled=false
